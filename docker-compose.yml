version: '3.8'

services:
  # ─── Base de datos ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: perseo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: perseo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-perseo123}
      POSTGRES_DB: perseo
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"   # acceso desde herramientas locales (DBeaver, TablePlus)
    networks:
      - perseo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perseo"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: perseo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"   # acceso local opcional
    networks:
      - perseo_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Evolution API (WhatsApp) ─────────────────────────
  evolution:
    image: atendai/evolution-api:v1.8.2
    container_name: perseo_evolution
    restart: unless-stopped
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-perseo-local-key-2024}
      DATABASE_ENABLED: "false"
      REDIS_ENABLED: "false"
      LOG_LEVEL: ERROR
      LOG_COLOR: "false"
      DEL_INSTANCE: "false"
      QRCODE_LIMIT: "30"
      QRCODE_EXPIRATION_TIME: "60"
      STORE_MESSAGES: "false"
      STORE_MESSAGE_UP: "false"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"
      CONFIG_SESSION_PHONE_CLIENT: "Perseo"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    ports:
      - "8080:8080"   # acceso directo a Evolution
    networks:
      - perseo_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Backend API ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: perseo_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://perseo:${POSTGRES_PASSWORD:-perseo123}@postgres:5432/perseo
      JWT_SECRET: ${JWT_SECRET:-perseo-local-jwt-secret-cambia-en-produccion}
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-perseo-local-key-2024}
      EVOLUTION_SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:3000/evolution}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/api/sheets/callback}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_AGENCY: ${STRIPE_PRICE_AGENCY:-}
      OPENAI_API_KEY_FALLBACK: ${OPENAI_API_KEY_FALLBACK:-}
      BACKEND_URL: ${BACKEND_URL:-http://backend:3000/api}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-perseo_meta_verify_2024}
      META_TEST_PHONE_NUMBER_ID: ${META_TEST_PHONE_NUMBER_ID:-}
      META_TEST_WABA_ID: ${META_TEST_WABA_ID:-}
      DIALOG360_PARTNER_ID: ${DIALOG360_PARTNER_ID:-}
      DIALOG360_PARTNER_TOKEN: ${DIALOG360_PARTNER_TOKEN:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      SEED_DEMO: ${SEED_DEMO:-true}
      LOG_PRETTY: ${LOG_PRETTY:-true}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - perseo_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Frontend Next.js ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
        NEXT_PUBLIC_META_APP_ID: ${META_APP_ID:-}
    container_name: perseo_frontend
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3001"
    networks:
      - perseo_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Nginx (Reverse Proxy) ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: perseo_nginx
    restart: unless-stopped
    ports:
      - "3000:80"     # ← URL local: http://localhost:3000
      - "80:80"       # ← URL producción: http://tudominio.com
      - "443:443"     # ← HTTPS producción
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - perseo_network

  # ─── Cloudflare Tunnel (webhook público) ─────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: perseo_tunnel
    restart: unless-stopped
    command: tunnel --url http://nginx:80 --no-autoupdate
    networks:
      - perseo_network
    depends_on:
      - nginx

volumes:
  postgres_data:
  evolution_instances:
  evolution_store:
  certbot_certs:
  certbot_www:

networks:
  perseo_network:
    driver: bridge
